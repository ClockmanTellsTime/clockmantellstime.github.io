<html>
<head>
    <title>Hacks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.12.0/js/md5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
</head>
<body>
    <div class="logIn">
        <p1 class="a">EZ money Hacks</p1><br><br>
        <input type="password" class="password" placeholder="  Password"><br><br>
        <button class="submit">Enable Hacks</button>
        <button class="reset">Disable Hacks</button><br>
        <p class="nice">Hacks disabled!</p>
    </div>
    <style>
        body {
            text-align: center;
            background-color: #117012;
        }
        .password {
            width: 260px;
            background-color: black;
            animation: ea 5s ease-in-out infinite alternate;
            border-radius: 10px;
        }
        button {
            width: 125px;
            background-color: black;
            color: #16C718;
            border-radius: 5px;
        }
        .a {
            font-size: 80px;
        }

        @keyframes ea {
            0% { color: red; }
            25% {color: orange;};
            50% {color: yellow; }
            75% {color: green;}
            100% {color: blue; }
        }  
    </style>
    <script defer>
        document.addEventListener("keypress",e => {
            if (e.key.toLowerCase() == "enter") {
                document.querySelector("body > div > button.submit").click()
            }
        })

        var attempts = 0;
        const code = '0394f141d4dbb40fe7eb69dd7fda51f4611e64092fd15d97e293944f29f8499d';
        
        function hash(str) {
            return String(sha256(sha224(md5(sha256(sha224(md5(str))))))).split("").reverse().join("");
        }


        document.querySelector(".submit").addEventListener("click",function() {
            password = document.querySelector(".password").value
            if (hash(password) == code) {
                password = document.querySelector(".password").value = ""
                localStorage.setItem("hacks_enabled",true)
                attempts = 0
                update()
            }
            else {
                attempts += 1
                document.querySelector(".nice").innerHTML = `Wrong password! Attempt: ${attempts}!`
            }
        })

        document.querySelector(".reset").addEventListener("click",function() {
            localStorage.setItem("hacks_enabled",false)
            update()
        })
        
        function update() {
            loggedIn = localStorage.getItem("hacks_enabled")
            var nice = document.querySelector(".nice")
            if (loggedIn == 'true') {nice.innerHTML = "hacks enabled!"}
            else {nice.innerHTML = "hacks disabled!"}
        }

        update()
    </script>
</body>
</html>
